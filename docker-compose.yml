services:
  nginx:
    image: nginx:alpine
    ports:
      - "9090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - wp_data:/var/www/html
    depends_on:
      wordpress:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  wordpress:
    image: wordpress:6-php8.2-fpm
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_secret123
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_HOST'])) {
          $$fhost = $$_SERVER['HTTP_X_FORWARDED_HOST'];
        } elseif (isset($$_SERVER['HTTP_HOST'])) {
          $$fhost = $$_SERVER['HTTP_HOST'];
        } else {
          $$fhost = 'wp.deploylab.shop';
        }
        define('WP_SITEURL', 'https://' . $$fhost);
        define('WP_HOME', 'https://' . $$fhost);
        define('FORCE_SSL_ADMIN', true);
    volumes:
      - wp_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_secret123
      MYSQL_ROOT_PASSWORD: root_secret123
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  wp_data:
  db_data:
